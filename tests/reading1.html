<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Test 1 | SGR Tamim IELTS</title>

<link rel="stylesheet" href="../css/reading.css">

<style>
html,body{
height:100%;
margin:0;
font-family:Arial,sans-serif;
background:#eef3f8;
overflow:hidden;
}

header{
height:70px;
background:#0d47a1;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
}

header h2{
margin:0;
}

#timer{
font-size:22px;
font-weight:bold;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

#passage{
width:50%;
overflow-y:auto;
background:white;
padding:25px;
border-right:4px solid #d6d6d6;
}

#resize{
width:8px;
background:#bdbdbd;
cursor:col-resize;
}

#questions{
flex:1;
overflow-y:auto;
background:#f8f8f8;
padding:25px;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

#passage{
width:100%;
height:45%;
border-right:none;
border-bottom:4px solid #ddd;
}

#resize{
display:none;
}

#questions{
height:55%;
}

}
</style>

</head>

<body>

<header>

<h2>Reading Test 1</h2>

<div id="timer">30:00</div>

</header>

<div class="container">

<div id="passage">

<h2>The Ice Cellars of Persia</h2>

<p><b>The passage will be added in Part 2.</b></p>

</div>

<div id="resize"></div>

<div id="questions">

<h2>Questions</h2>

<p><b>The questions will be added in Part 3.</b></p>

</div>

</div>

<script>

const resize=document.getElementById("resize");

const left=document.getElementById("passage");

let active=false;

resize.addEventListener("mousedown",()=>{

active=true;

});

document.addEventListener("mouseup",()=>{

active=false;

});

document.addEventListener("mousemove",(e)=>{

if(!active)return;

let width=e.clientX/window.innerWidth*100;

if(width<25)width=25;

if(width>75)width=75;

left.style.width=width+"%";

});

</script>

</body>
</html>
