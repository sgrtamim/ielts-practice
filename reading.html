
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGR IELTS Reading</title>

<link rel="stylesheet" href="css/reading.css">
</head>

<body>

<header>

<div class="left">
<h2 id="testTitle">Reading Test</h2>
</div>

<div class="middle">
<span id="timer">30:00</span>
</div>

<div class="right">

<div class="zoomBox">

<b>Passage</b>

<button id="passageMinus">A-</button>

<button id="passagePlus">A+</button>

</div>

<div class="zoomBox">

<b>Questions</b>

<button id="questionMinus">A-</button>

<button id="questionPlus">A+</button>

</div>

</div>

</header>



<div id="mainContainer">

<div id="passagePanel">

<div class="panelHeader">

<h3>Passage</h3>

</div>

<div id="passageContent">

Loading passage...

</div>

</div>



<div id="divider"></div>



<div id="questionPanel">

<div class="panelHeader">

<h3>Questions</h3>

</div>

<div id="questionContent">

Loading questions...

</div>

</div>

</div>



<div id="submitBar">

<button id="submitBtn">

Submit Test

</button>

</div>



<script src="js/reading.js"></script>

</body>
</html>
