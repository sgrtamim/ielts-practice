<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SGR Tamim IELTS - Reading</title>

<link rel="stylesheet" href="css/reading.css">

</head>

<body>

<header>

<div class="logo">

<h2>SGR Tamim IELTS</h2>
<p>Academic Reading</p>

</div>

<div class="header-right">

<button id="zoomOut">A−</button>
<button id="zoomReset">A</button>
<button id="zoomIn">A+</button>

<div id="timer">
30:00
</div>

</div>

</header>

<main>

<!-- LEFT -->

<section id="passageSection">

<div class="sectionTitle">

<h3>Reading Passage</h3>

<input
type="text"
id="searchBox"
placeholder="Search in passage...">

</div>

<div id="passage">

Loading passage...

</div>

</section>

<div id="divider"></div>

<!-- RIGHT -->

<section id="questionSection">

<div class="sectionTitle">

<h3>Questions</h3>

<div id="questionPalette">

<!-- Generated automatically -->

</div>

</div>

<div id="questions">

Loading questions...

</div>

</section>

</main>

<footer>

<button id="previousBtn">

◀ Previous

</button>

<button id="flagBtn">

🚩 Flag

</button>

<div>

Question

<span id="currentQuestion">

1

</span>

</div>

<button id="nextBtn">

Next ▶

</button>

<button id="submitBtn">

Submit Test

</button>

</footer>

<script src="js/timer.js"></script>
<script src="js/navigation.js"></script>
<script src="js/highlight.js"></script>
<script src="js/zoom.js"></script>
<script src="js/autosave.js"></script>
<script src="js/scoring.js"></script>
<script src="js/reading.js"></script>

</body>

</html>
