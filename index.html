<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGR Tamim IELTS</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
color:#333;
}

header{
background:#0d47a1;
color:white;
text-align:center;
padding:30px;
}

header h1{
margin:0;
font-size:36px;
}

header p{
margin-top:10px;
font-size:18px;
}

.container{
width:90%;
max-width:900px;
margin:auto;
padding:30px 0;
}

.card{
background:white;
border-radius:15px;
padding:25px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h2{
margin-top:0;
color:#0d47a1;
}

.button{
display:block;
width:100%;
background:#1565c0;
color:white;
padding:15px;
margin:12px 0;
border:none;
border-radius:10px;
text-align:center;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.button:hover{
background:#0d47a1;
}

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>

</head>

<body>

<header>
<h1>SGR Tamim IELTS</h1>
<p>Cambridge-style IELTS Preparation Platform</p>
</header>

<div class="container">

<div class="card">

<h2>Practice Modules</h2>

<a href="reading.html" class="button">📖 Reading Practice</a>

<a href="#" class="button">✍ Writing Practice</a>

<a href="#" class="button">🎤 Speaking Practice</a>

<a href="#" class="button">📚 Vocabulary</a>

</div>

<div class="card">

<h2>Latest Reading Tests</h2>

<div id="readingList">

Loading tests...

</div>

</div>

<label>Choose Time</label>

<select id="time-reading1">

<option value="15">15 Minutes</option>
<option value="20">20 Minutes</option>
<option value="25">25 Minutes</option>
<option value="30" selected>30 Minutes</option>
<option value="60">60 Minutes</option>

</select>

<br><br>

<button class="button" onclick="startTest('reading1','time-reading1')">
Start Test
</button>

<hr>

<h3>📖 Reading Test 2</h3>

<label>Choose Time</label>

<select id="time-reading2">

<option value="15">15 Minutes</option>
<option value="20">20 Minutes</option>
<option value="25">25 Minutes</option>
<option value="30" selected>30 Minutes</option>
<option value="60">60 Minutes</option>

</select>

<br><br>

<button class="button" onclick="startTest('reading2','time-reading2')">
Start Test
</button>

</div>

</div>

<footer>

© 2026 SGR Tamim IELTS

</footer>

<script>

function startTest(testName, selectId){

    const minutes = document.getElementById(selectId).value;

    localStorage.setItem("readingTime", minutes);

    window.location.href = "reading.html?test=" + testName;

}

</script>

</body>

</html>
